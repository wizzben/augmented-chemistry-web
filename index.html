<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Augmented Chemistry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
      color: #eee;
      height: 100vh;
      display: flex;
    }

    /* ─── Left panel: element palette ─── */
    #palette-panel {
      width: 140px;
      min-width: 140px;
      background: #16162a;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      padding: 12px 8px;
      gap: 8px;
      overflow-y: auto;
    }
    #palette-panel h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 4px;
    }
    #element-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      transition: opacity 0.2s ease;
    }
    #palette-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }
    .action-btn {
      padding: 7px 4px;
      font-size: 12px;
      font-weight: bold;
      border: 1px solid #444;
      border-radius: 4px;
      background: #2a2a3e;
      color: #ccc;
      cursor: pointer;
    }
    .action-btn:hover { background: #3a3a5e; }

    /* ─── Center: 3D canvas ─── */
    #canvas-panel {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #app { width: 100%; height: 100%; }

    /* ─── Atom grab list (markerless mode overlay) ─── */
    #atom-grab-list {
      display: none; /* shown only in markerless mode */
      position: absolute;
      left: 8px;
      top: 8px;
      bottom: 8px;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      overflow-y: auto;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #atom-grab-list::-webkit-scrollbar { width: 0; }

    /* ─── Hand skeleton overlay (markerless mode) ─── */
    #hand-overlay {
      display: none; /* shown only in markerless mode */
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5; /* above 3D canvas, below atom-grab-list (z-index:10) */
    }

    #info-bar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #aaa;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 12px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ─── Right panel: info + library ─── */
    #right-panel {
      width: 200px;
      min-width: 200px;
      background: #16162a;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #recognition-bar {
      padding: 10px 10px 6px;
      font-size: 12px;
      color: #aaa;
      border-bottom: 1px solid #333;
      min-height: 44px;
    }
    #library-header {
      padding: 8px 10px 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      border-bottom: 1px solid #333;
    }
    #library-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    #library-list::-webkit-scrollbar { width: 4px; }
    #library-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
  <!-- Left: element palette -->
  <div id="palette-panel">
    <h2>Elements</h2>
    <div id="element-grid"></div>
    <div id="palette-actions">
      <button class="action-btn" id="ar-btn">Start AR</button>
      <button class="action-btn" id="toggle-video-btn" style="display:none">Hide Video</button>
      <button class="action-btn" id="ar-benzene-btn"   style="display:none">Benzene</button>
      <button class="action-btn" id="ar-label-btn"     style="display:none">Labels</button>
      <button class="action-btn" id="markerless-btn">Markerless</button>
      <button class="action-btn" id="swap-hands-btn" style="display:none">L=Grab, R=Rotate</button>
      <button class="action-btn" id="simple-mode-btn" style="display:none">Simple Mode: Off</button>
      <button class="action-btn" id="view-reset-btn" style="display:none">Reset View</button>
      <button class="action-btn" id="view-front-btn" style="display:none">Front</button>
      <button class="action-btn" id="view-side-btn"  style="display:none">Side</button>
      <button class="action-btn" id="view-top-btn"   style="display:none">Top</button>
      <button class="action-btn" id="undo-btn">Undo (Ctrl+Z)</button>
      <button class="action-btn" id="reset-btn">Reset</button>
    </div>
  </div>

  <!-- Center: 3D canvas -->
  <div id="canvas-panel">
    <div id="app"></div>
    <canvas id="hand-overlay"></canvas>
    <div id="atom-grab-list"></div>
    <div id="info-bar">Select an element and click the canvas to start building.</div>
  </div>

  <!-- Right: recognition + library -->
  <div id="right-panel">
    <div id="recognition-bar">—</div>
    <div id="library-header">Molecule Library</div>
    <div id="library-list"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
