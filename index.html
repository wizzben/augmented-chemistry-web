<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Augmented Chemistry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; }
    #app { width: 100vw; height: 100vh; }
    #controls {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    select {
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a3e;
      color: #eee;
      cursor: pointer;
      max-width: 280px;
    }
    #info {
      color: #888;
      font-size: 12px;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="controls">
    <select id="molecule-selector"></select>
    <div id="info"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
